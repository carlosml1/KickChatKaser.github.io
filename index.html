<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kick PRO</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0f; color:white; }
.container { display:flex; height:100vh; }
.video-section { flex:3; }
iframe { width:100%; height:100%; border:none; }

.chat-section { flex:1; display:flex; flex-direction:column; background:#111; }

.chat-header { padding:8px; background:#1a1a1f; }
.chat-messages { flex:1; overflow-y:auto; padding:8px; }
.chat-input { display:flex; padding:8px; background:#1a1a1f; }

input { flex:1; padding:6px; }
button { margin-left:5px; }

.kick { color:#00ff99; }
</style>
</head>

<body>

<div class="container">

<div class="video-section">
<iframe src="https://kick.com/kaserpac"></iframe>
</div>

<div class="chat-section">

<div class="chat-header">🔥 Chat Kick</div>
<div id="kickChat" class="chat-messages"></div>

<div class="chat-header">💬 Mi Chat</div>
<div id="chat" class="chat-messages"></div>

<div class="chat-input">
<input id="messageInput" placeholder="mensaje">
<button onclick="sendMessage()">Enviar</button>
</div>

</div>

</div>

<script>
const chat = document.getElementById("chat");
const kickChat = document.getElementById("kickChat");
const input = document.getElementById("messageInput");

let username = localStorage.getItem("username") || "User";

// ================= TU CHAT =================
function sendMessage(){
  let text = input.value.trim();
  if(!text) return;

  // mostrar en tu chat
  const div = document.createElement("div");
  div.innerHTML = `<b>${username}:</b> ${text}`;
  chat.appendChild(div);

  // enviar a Kick
  sendToKick(text);

  input.value="";
}

// ================= ENVIAR A KICK =================
function sendToKick(text){
  fetch("https://kick-backend.onrender.com/send-kick", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });
}

// ================= CARGAR CHAT KICK =================
async function loadKickChat(){
  try{
    const res = await fetch("https://kick-backend.onrender.com/kick-chat");
    const data = await res.json();

    kickChat.innerHTML = "";

    data.data.forEach(msg => {
      const div = document.createElement("div");
      div.innerHTML = `<span class="kick">${msg.sender.username}:</span> ${msg.content}`;
      kickChat.appendChild(div);
    });

    kickChat.scrollTop = kickChat.scrollHeight;

  }catch(e){
    console.log("Error cargando chat", e);
  }
}

setInterval(loadKickChat, 2000);
</script>

</body>
</html>
