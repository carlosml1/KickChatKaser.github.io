<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kick Clone PRO</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b0f; color:white; height:100vh; overflow:hidden; }
.container { display:flex; height:100vh; }
.video-section { flex:3; background:black; }
iframe { width:100%; height:100%; border:none; }
.chat-section { flex:1; display:flex; flex-direction:column; background:#111; }
.chat-header { padding:10px; background:#1a1a1f; display:flex; justify-content:space-between; }
.chat-messages { flex:1; overflow-y:auto; padding:10px; }
.message { margin-bottom:6px; }
.chat-input { display:flex; padding:10px; background:#1a1a1f; position:relative; }
input { flex:1; padding:8px; border:none; border-radius:5px; }
button { margin-left:5px; }

/* icono cambiar nombre */
.settings { cursor:pointer; }

/* autocomplete */
.autocomplete { position:absolute; bottom:60px; left:10px; right:10px; background:#1a1a1f; border:1px solid #333; display:none; }
.autocomplete-item { padding:5px; cursor:pointer; }

/* admin chat */
.admin-chat { position:fixed; bottom:10px; right:10px; width:250px; height:200px; background:#000; border:1px solid #444; font-size:12px; overflow:auto; display:none; }
.chat-image {
  max-width: 250px;
  max-height: 250px;
  border-radius: 8px;
  margin-top: 5px;
}
</style>
</head>

<body>
<div class="container">

<div class="video-section">
<iframe src="https://kick.com/kaserpac" allowfullscreen></iframe>
</div>

<div class="chat-section">
<div class="chat-header">
<span>Chat</span>
<span class="settings" onclick="changeName()">⚙️</span>
<span class="settings" id="adminToggle" style="margin-left:10px; display:none;" onclick="toggleAdminChat()">🛡️</span>
<span class="settings" onclick="loginKick()">🔐</span>
</div>

<div id="chat" class="chat-messages"></div>

<div class="chat-input">
<div id="autocomplete" class="autocomplete"></div>
<input id="messageInput" placeholder="mensaje">
<button onclick="sendMessage()">Enviar</button>
</div>
</div>

</div>

<div id="adminChat" class="admin-chat" style="display:none"></div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("messageInput");
const auto = document.getElementById("autocomplete");
const adminChat = document.getElementById("adminChat");

function getRoleIcon(role){
  switch(role){
    case "admin": return "👑";
    case "mod": return "🛡️";
    case "vip": return "💎";
    default: return "";
  }
}

function loginKick(){
  const clientId = "TU_CLIENT_ID_REAL";
  const redirect = encodeURIComponent("https://carlosml1.github.io/KickChatKaser.github.io/");

  const url = `https://kick.com/oauth/authorize?response_type=code&client_id=${clientId}&redirect_uri=${redirect}&scope=user:read`;

  window.location.href = url;
}

// ================= USERS =================
let userId = localStorage.getItem("userId");
if(!userId){ userId = Math.random().toString(36).substr(2,9); localStorage.setItem("userId", userId); }

let username = localStorage.getItem("username") || "user"+userId;

// Mostrar ID solo primera vez
if(!localStorage.getItem("seenId")){
  setTimeout(()=>{
    const msg = document.createElement("div");
    msg.className = "message";
    msg.style.opacity = "0.7";
    msg.innerHTML = `<i>Tu ID: ${userId}</i>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }, 500);
  localStorage.setItem("seenId", "true");
}
localStorage.setItem("username", username);

// cooldown nombre
function changeName(){
  document.getElementById("settingsModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("settingsModal").style.display = "none";
}

function saveSettings(){
  let newName = document.getElementById("nameInput").value.trim();
  let color = document.getElementById("colorPicker").value;

  let last = localStorage.getItem("nameChange");
  let now = Date.now();

  if(newName && newName !== username){
    if(last && now - last < 30*24*60*60*1000){
      alert("Solo puedes cambiar el nombre cada 30 días");
    } else {
      username = newName;
      localStorage.setItem("username", newName);
      localStorage.setItem("nameChange", now);
    }
  }

  if(color){
    localStorage.setItem("nameColor", color);
  }

  closeModal();
}

// ================= ROLES POR ID =================

const vipList = ["id1","id2"];
const modList = ["id3"];
const adminList = ["g466bnrlt"]; // ejemplo

function getRoleById(id){
  if(adminList.includes(id)) return "admin";
  if(modList.includes(id)) return "mod";
  if(vipList.includes(id)) return "vip";
  return "normal";
}

let role = getRoleById(userId);

// mostrar botón admin correctamente cuando el DOM esté listo
window.addEventListener("DOMContentLoaded", () => {
  if(role === "admin"){
    const btn = document.getElementById("adminToggle");
    if(btn) btn.style.display = "inline";
  }
});

function canDelete(targetRole){
  if(role==="admin") return true;
  if(role==="mod" && (targetRole==="normal"||targetRole==="vip")) return true;
  return false;
}

// ================= 7TV =================
let emotes = {};
async function loadSet(){
  let r = await fetch("https://7tv.io/v3/emote-sets/01FCKRX4D0000FA9SJTT9E2MC3");
  let d = await r.json();
  d.emotes.forEach(e=> emotes[e.name.toLowerCase()] = `https://cdn.7tv.app/emote/${e.id}/2x.webp`);
}
loadSet();

function parse(text){
  return text.split(" ").map(w=> emotes[w.toLowerCase()] ? `<img src="${emotes[w.toLowerCase()]}" height=24>` : w).join(" ");
}

// ================= ADMIN TOGGLE =================
function toggleAdminChat(){
  if(adminChat.style.display === "none"){
    adminChat.style.display = "block";
  } else {
    adminChat.style.display = "none";
  }
}

// ================= CHAT =================
function sendMessage(){
  let rawText = input.value.trim();
  if(!rawText) return;

  // comando /id
  if(rawText === "/id"){
    const msg = document.createElement("div");
    msg.className = "message";
    msg.style.opacity = "0.7";
    msg.innerHTML = `<i>Tu ID: ${userId}</i>`;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    input.value = "";
    return;
  }

  let userRole = getRoleById(userId);
  let nameColor = localStorage.getItem("nameColor") || "#ffffff";

  let div = document.createElement("div");
  div.className = "message";

  let icon = getRoleIcon(userRole);

  div.innerHTML = `${icon} <span style="color:${nameColor}">${username}</span>: ` + parse(rawText);

  if(role==="mod" || role==="admin"){
    let del = document.createElement("span");
    del.textContent=" 🗑";
    del.onclick=()=>{ if(canDelete(userRole)) div.remove(); };
    div.appendChild(del);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;

  if(role==="admin"){
    adminChat.innerHTML += `${username} -> ${userId}<br>`;
  }

  input.value="";
}



// ENTER
input.addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); sendMessage(); }
  if (e.key === "Backspace") {
  auto.style.display = "none";
}
});

let currentMatches = [];
let selectedIndex = 0;

input.addEventListener("keydown", (e) => {

  if (e.key === "Tab") {
    e.preventDefault();

    let value = input.value.trim();
    if (!value) return;

    let words = value.split(" ");
    let lastWord = words[words.length - 1].toLowerCase();

    if (!lastWord) return;

    // generar matches
    currentMatches = Object.keys(emotes)
      .filter(e => e.startsWith(lastWord))
      .slice(0, 8);

    if (currentMatches.length === 0) return;

    // si está cerrado → abrir
    if (auto.style.display !== "block") {
      selectedIndex = 0;
      renderAutocomplete();
      auto.style.display = "block";
      return;
    }

    // si ya está abierto → autocompletar el seleccionado
    let selected = currentMatches[selectedIndex];
    words.pop();
    words.push(selected);

    input.value = words.join(" ") + " ";
    auto.style.display = "none";
  }
});

function renderAutocomplete(){
  auto.innerHTML = "";

  currentMatches.forEach((m, i) => {
    let d = document.createElement("div");
    d.className = "autocomplete-item";

    if (i === selectedIndex) {
      d.style.background = "#333";
    }

    d.innerHTML = `<img src="${emotes[m]}" height=24> ${m}`;

    d.onclick = () => {
      let words = input.value.split(" ");
      words.pop();
      words.push(m);
      input.value = words.join(" ") + " ";
      auto.style.display = "none";
    };

    auto.appendChild(d);
  });
}

input.addEventListener("input", () => {
  // si el panel está abierto y el usuario modifica texto → cerrar
  if (auto.style.display === "block") {
    auto.style.display = "none";
  }
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".chat-input")) {
    auto.style.display = "none";
  }
});

const dropZone = document.querySelector(".chat-section");

// permitir soltar
dropZone.addEventListener("dragover", (e) => {
  e.preventDefault();
  dropZone.style.background = "#1a1a1f"; // efecto visual
});

// salir
dropZone.addEventListener("dragleave", () => {
  dropZone.style.background = "#111";
});

// soltar archivo
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.style.background = "#111";

  const files = e.dataTransfer.files;

  if (!files || files.length === 0) return;

  const file = files[0];

  if (!file.type.startsWith("image/")) {
    alert("Solo imágenes");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    sendImageMessage(event.target.result);
  };

  reader.readAsDataURL(file);
});

function sendImageMessage(src){
  let userRole = getRoleById(userId);
  let nameColor = localStorage.getItem("nameColor") || "#ffffff";

  const div = document.createElement("div");
  div.className = "message";

  const icon = getRoleIcon(userRole);

  div.innerHTML = `
    ${icon} <span style="color:${nameColor}">${username}</span>:<br>
    <img src="${src}" class="chat-image">
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ================= OAUTH RESPONSE =================

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(code){
  fetch(`https://kick-backend.onrender.com/token?code=${code}`)
    .then(res => res.json())
    .then(data => {
      console.log("TOKEN:", data);

      // guardar token
      localStorage.setItem("kickToken", data.access_token);

      // 🔥 aquí simulamos login real
      if(data.access_token){
        username = "KickUser"; // temporal
        localStorage.setItem("username", username);

        alert("Login con Kick completado 🚀");
      }
    });

  window.history.replaceState({}, document.title, window.location.pathname);
}

</script>

<!-- MODAL SETTINGS -->
<div id="settingsModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100;">
  <div style="background:#1a1a1f;padding:20px;border-radius:10px;width:300px;">
    <h3>Ajustes</h3>

    <label>Nombre</label>
    <input id="nameInput" style="width:100%;margin-bottom:10px;" placeholder="Tu nombre">

    <small>Puedes cambiarlo cada 30 días</small>

    <br><br>

    <label>Color del nombre</label>
    <input type="color" id="colorPicker" style="width:100%;height:40px;border:none;">

    <br><br>

    <button onclick="saveSettings()">Guardar</button>
    <button onclick="closeModal()">Cancelar</button>
  </div>
</div>

</body>
</html>
